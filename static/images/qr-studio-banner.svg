<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="250" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="80" cy="60" r="50" fill="rgba(255,255,255,0.08)"/>
  <circle cx="720" cy="180" r="70" fill="rgba(255,255,255,0.08)"/>
  
  <!-- QR Code Icon -->
  <g transform="translate(370, 50)">
    <!-- QR Code pattern -->
    <rect x="0" y="0" width="30" height="30" fill="white" rx="3"/>
    <rect x="4" y="4" width="22" height="22" fill="url(#bgGradient)" rx="2"/>
    <rect x="8" y="8" width="14" height="14" fill="white" rx="1"/>
    
    <rect x="45" y="0" width="30" height="30" fill="white" rx="3"/>
    <rect x="49" y="4" width="22" height="22" fill="url(#bgGradient)" rx="2"/>
    <rect x="53" y="8" width="14" height="14" fill="white" rx="1"/>
    
    <rect x="0" y="45" width="30" height="30" fill="white" rx="3"/>
    <rect x="4" y="49" width="22" height="22" fill="url(#bgGradient)" rx="2"/>
    <rect x="8" y="53" width="14" height="14" fill="white" rx="1"/>
    
    <!-- Center -->
    <rect x="38" y="38" width="40" height="40" fill="white" rx="4"/>
    <circle cx="58" cy="58" r="12" fill="url(#bgGradient)"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="170" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="36" font-weight="bold" fill="white">
    QR Studio
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.85)">
    Professional QR Code Generator
  </text>
</svg>
